artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a small JSON summary report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["text_or_log_file", "generated_output_artifact"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "The task requires parsing a small Apache-style access log, aggregating request and client information, and producing a deterministic JSON report."
solution_explanation = "Read every non-empty log entry, count requests and distinct client IP addresses, count requested paths, and write the requested summary to /app/report.json."
verification_explanation = "The verifier validates the exact JSON schema and independently calculates the expected request count, unique IP count, and most frequently requested path from /app/access.log."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

